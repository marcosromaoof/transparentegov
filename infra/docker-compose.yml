services:
  postgres:
    image: postgres:16
    container_name: transparentegov-postgres
    environment:
      POSTGRES_DB: transparentegov
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: transparentegov-redis
    ports:
      - "6379:6379"

volumes:
  pg_data: